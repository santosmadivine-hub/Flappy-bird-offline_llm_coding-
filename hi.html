
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Flappy Bird Premium
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:
linear-gradient(
#6FD6FF,
#E8F9FF
);

font-family:
Arial;

}

#container{

position:relative;

}

canvas{

border-radius:20px;

box-shadow:
0 20px 60px
rgba(
0,
0,
0,
.3
);

}

#score{

position:absolute;

top:15px;

left:50%;

transform:
translateX(-50%);

font-size:42px;

font-weight:bold;

color:white;

text-shadow:
3px 3px 6px black;

}

</style>

</head>

<body>

<div id="container">

<div id="score">

0

</div>

<canvas
id="gameCanvas"
width="560"
height="800">
</canvas>

</div>

<script>

const canvas=
document.getElementById(
"gameCanvas"
);

const ctx=
canvas.getContext(
"2d"
);

const scoreUI=
document.getElementById(
"score"
);

const W=
canvas.width;

const H=
canvas.height;

const GROUND=110;

const GRAVITY=.28;

const JUMP=-6.8;

const PIPE_SPEED=1.7;

const GAP=250;

let started=false;

let gameOver=false;

let waitingRestart=false;

let score=0;

let high=
Number(
localStorage.getItem(
"bestScore"
)||0
);

let lastPipe=0;

let pipes=[];

let clouds=0;

let wing=0;

const bird={

x:120,

y:350,

vy:0

};

function reset(){

bird.y=350;

bird.vy=0;

pipes=[];

score=0;

started=false;

gameOver=false;

waitingRestart=false;

scoreUI.textContent=0;

lastPipe=
Date.now();

}

function drawBackground(){

ctx.clearRect(
0,
0,
W,
H
);

ctx.fillStyle=
"#6FD6FF";

ctx.fillRect(
0,
0,
W,
H
);

clouds-=.15;

if(
clouds<-W
)
clouds=0;

ctx.fillStyle=
"rgba(255,255,255,.7)";

for(
let i=0;
i<5;
i++
){

ctx.beginPath();

ctx.arc(
i*180+
clouds,
150,
40,
0,
7
);

ctx.arc(
i*180+
35+
clouds,
135,
35,
0,
7
);

ctx.fill();

}

ctx.fillStyle=
"#89D97E";

ctx.beginPath();

ctx.moveTo(
0,
450
);

for(
let i=0;
i<=W;
i+=90
){

ctx.quadraticCurveTo(
i+40,
300,
i+90,
450
);

}

ctx.lineTo(
W,
H
);

ctx.lineTo(
0,
H
);

ctx.fill();

}

function drawGround(){

ctx.fillStyle=
"#E6D49A";

ctx.fillRect(
0,
H-GROUND,
W,
GROUND
);

}

function drawBird(){

ctx.save();

ctx.translate(
bird.x,
bird.y
);

ctx.rotate(
bird.vy*.05
);

wing+=.2;

ctx.fillStyle=
"#FFD63D";

ctx.beginPath();

ctx.ellipse(
0,
0,
22,
16,
0,
0,
7
);

ctx.fill();

ctx.fillStyle=
"#FFB000";

ctx.beginPath();

ctx.ellipse(
-8,
Math.sin(
wing
)*6,
14,
7,
0,
0,
7
);

ctx.fill();

ctx.fillStyle=
"white";

ctx.beginPath();

ctx.arc(
10,
-5,
6,
0,
7
);

ctx.fill();

ctx.fillStyle=
"black";

ctx.beginPath();

ctx.arc(
12,
-5,
2,
0,
7
);

ctx.fill();

ctx.fillStyle=
"#FF7A00";

ctx.beginPath();

ctx.moveTo(
20,
0
);

ctx.lineTo(
32,
4
);

ctx.lineTo(
20,
8
);

ctx.fill();

ctx.restore();

}

function spawnPipe(){

let top=
Math.random()
*240
+90;

pipes.push({

x:W,

top,

bottom:
top+GAP,

passed:false

});

}

function drawPipes(){

ctx.fillStyle=
"#5BC53D";

pipes.forEach(p=>{

ctx.fillRect(
p.x,
0,
70,
p.top
);

ctx.fillRect(
p.x-5,
p.top-20,
80,
20
);

ctx.fillRect(
p.x,
p.bottom,
70,
H-p.bottom-GROUND
);

ctx.fillRect(
p.x-5,
p.bottom,
80,
20
);

});

}

function update(){

if(
!started
||
gameOver
)
return;

bird.vy+=GRAVITY;

bird.y+=bird.vy;

if(
bird.y>
H-GROUND
){

end();

}

if(
Date.now()
-lastPipe
>
3000
){

spawnPipe();

lastPipe=
Date.now();

}

pipes.forEach(p=>{

p.x-=
PIPE_SPEED;

if(
!p.passed
&&
p.x<
bird.x
){

score++;

scoreUI.textContent=
score;

p.passed=true;

}

if(

bird.x+20>
p.x

&&

bird.x-20<
p.x+70

){

if(

bird.y-15<
p.top

||

bird.y+15>
p.bottom

){

end();

}

}

});

pipes=
pipes.filter(
p=>
p.x>-100
);

}

function end(){

if(
gameOver
)
return;

gameOver=true;

waitingRestart=true;

if(
score>
high
){

high=
score;

localStorage.setItem(
"bestScore",
high
);

}

}

function drawGameOver(){

ctx.fillStyle=
"rgba(0,0,0,.65)";

ctx.fillRect(
0,
0,
W,
H
);

ctx.textAlign=
"center";

ctx.fillStyle=
"white";

ctx.font=
"52px Arial";

ctx.fillText(
"GAME OVER",
W/2,
220
);

ctx.font=
"32px Arial";

ctx.fillText(
"Score: "+score,
W/2,
310
);

ctx.fillText(
"Highest: "+high,
W/2,
370
);

ctx.font=
"22px Arial";

ctx.fillStyle=
"#FFD54F";

ctx.fillText(
"Click or Press SPACE",
W/2,
500
);

ctx.fillText(
"to Restart",
W/2,
540
);

}

function loop(){

drawBackground();

drawGround();

update();

drawPipes();

drawBird();

ctx.font=
"22px Arial";

ctx.fillStyle=
"white";

ctx.fillText(
"Best: "+high,
20,
40
);

if(
gameOver
){

drawGameOver();

}

requestAnimationFrame(
loop
);

}

function flap(){

if(
gameOver
){

if(
waitingRestart
){

reset();

started=true;

}

return;

}

started=true;

bird.vy=
JUMP;

}

window.addEventListener(
"mousedown",
flap
);

window.addEventListener(
"touchstart",
flap
);

document.addEventListener(
"keydown",
e=>{

if(
e.code==="Space"
){

flap();

}

});

reset();

loop();

</script>

</body>

</html>
```
